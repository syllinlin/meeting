<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Presentations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #667eea 0%, #764ba2 40%, #111 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            padding: 32px 16px;
        }

        .wrapper {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
        }

        .title {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.95rem;
            opacity: 0.8;
        }

        .grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }

        .card {
            background: rgba(17, 17, 17, 0.92);
            border-radius: 16px;
            padding: 20px 20px 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: -1px;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.1), transparent 55%);
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 22px 50px rgba(0, 0, 0, 0.75);
            border-color: rgba(255, 255, 255, 0.14);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: #a5b4fc;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 0.88rem;
            line-height: 1.5;
            color: #e5e7eb;
            opacity: 0.9;
            margin-bottom: 18px;
        }

        .meta {
            font-size: 0.75rem;
            color: #9ca3af;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }

        .meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            border-radius: 999px;
            padding: 7px 14px;
            font-size: 0.82rem;
            font-weight: 500;
            border: 1px solid rgba(148, 163, 184, 0.6);
            background: rgba(15, 23, 42, 0.9);
            color: #e5e7eb;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.1s ease;
        }

        .btn.primary {
            border-color: #4f46e5;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: #f9fafb;
        }

        .btn:hover {
            transform: translateY(-1px);
            border-color: #e5e7eb;
        }

        .btn.primary:hover {
            background: linear-gradient(135deg, #4338ca, #4f46e5);
            border-color: #e5e7eb;
        }

        .footer {
            margin-top: 26px;
            font-size: 0.8rem;
            text-align: center;
            color: #9ca3af;
            opacity: 0.85;
        }

        @media (max-width: 640px) {
            .title {
                font-size: 1.7rem;
            }

            body {
                padding-top: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <h1 class="title">Presentation Hub</h1>
            <p class="subtitle">Select a slide deck to view the latest generated HTML presentation.</p>
        </header>

        <main class="grid" id="cardsRoot">
            <!-- Cards are generated by JavaScript -->
        </main>

        <footer class="footer">
            This index is static. When you add new <code>presentation_*.md</code>, update the list in the script below.
        </footer>

        <script>
            // 在这里维护你的演示列表：只要加一项就会多一张卡片
            const decks = [
                {
                    id: 'origin',
                    title: 'Origin Presentation',
                    tag: 'Deck · Origin',
                    desc: 'Intro / origin story slides generated from presentation_origin.md.',
                    source: 'docs/presentation_origin.md',
                    output: 'presentation_origin.html'
                },
                {
                    id: 'style',
                    title: 'Style Presentation',
                    tag: 'Deck · Style',
                    desc: 'Style / design slides generated from presentation_style.md.',
                    source: 'docs/presentation_style.md',
                    output: 'presentation_style.html'
                }
                // 以后新增一个：只要在这里再加一个对象
                // {
                //   id: 'xxx',
                //   title: 'XXX Presentation',
                //   tag: 'Deck · XXX',
                //   desc: '...',
                //   source: 'docs/presentation_xxx.md',
                //   output: 'presentation_xxx.html'
                // }
            ];

            const root = document.getElementById('cardsRoot');

            decks.forEach(deck => {
                const article = document.createElement('article');
                article.className = 'card';
                article.innerHTML = `
          <div>
            <div class="card-tag">${deck.tag}</div>
            <h2 class="card-title">${deck.title}</h2>
            <p class="card-desc">${deck.desc}</p>
            <div class="meta">
              <span>Source: <code>${deck.source}</code></span>
              <span>Output: <code>${deck.output}</code></span>
            </div>
          </div>
          <div class="card-actions">
            <a class="btn" href="${deck.output}" target="_blank" rel="noopener">Open</a>
          </div>
        `;
                root.appendChild(article);
            });
        </script>
    </div>
</body>

</html>
